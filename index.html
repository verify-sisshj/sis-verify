<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Card Verification — Springdale Indian School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a2744;
    --crimson: #cc0000;
    --gold: #c8a04a;
    --blue: #2E75B6;
    --light: #f4f6fb;
    --white: #ffffff;
    --muted: #6b7a99;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(46,117,182,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(200,160,74,0.06) 0%, transparent 50%);
  }
  .card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 4px 40px rgba(26,39,68,0.13);
    max-width: 560px;
    width: 100%;
    overflow: hidden;
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-header {
    background: var(--navy);
    padding: 28px 32px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--crimson), var(--gold), var(--crimson));
  }
  .school-name {
    font-family: 'Playfair Display', serif;
    color: var(--white);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .school-sub {
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .verified-badge {
    margin: 24px auto 0;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 6px rgba(46,204,113,0.18), 0 4px 20px rgba(46,204,113,0.35);
    animation: pop 0.5s 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }
  .verified-badge svg {
    width: 36px; height: 36px;
    stroke: white; stroke-width: 3;
    fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .verified-badge svg path {
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    animation: draw 0.4s 0.7s ease forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  .card-body { padding: 28px 32px 32px; }
  .verified-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .verified-subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 28px;
  }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #dde3f0, transparent);
    margin-bottom: 24px;
  }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .info-item {
    background: var(--light);
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 3px solid var(--blue);
  }
  .info-item.full {
    grid-column: 1 / -1;
    border-left-color: var(--gold);
  }
  .info-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  .info-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
  }
  .watermark-box {
    border: 2px dashed rgba(46,204,113,0.4);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
    background: rgba(46,204,113,0.04);
    margin-bottom: 24px;
  }
  .watermark-text {
    font-size: 13px;
    color: #27ae60;
    font-weight: 500;
    line-height: 1.6;
  }
  .watermark-stamp {
    display: inline-block;
    border: 2.5px solid #27ae60;
    border-radius: 8px;
    padding: 6px 18px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #27ae60;
    letter-spacing: 3px;
    margin-top: 10px;
    opacity: 0.85;
    transform: rotate(-2deg);
  }
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
  }
  .footer-note strong { color: var(--navy); }
  .card-footer {
    background: var(--light);
    border-top: 1px solid #e8edf5;
    padding: 14px 32px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
  .not-found {
    text-align: center;
    padding: 40px 32px;
  }
  .not-found-icon { font-size: 48px; margin-bottom: 16px; }
  .not-found h2 {
    font-family: 'Playfair Display', serif;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .not-found p { color: var(--muted); font-size: 14px; }
  @media (max-width: 480px) {
    .info-grid { grid-template-columns: 1fr; }
    .info-item.full { grid-column: 1; }
    .card-body { padding: 20px; }
    .card-header { padding: 20px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="school-name">Springdale Indian School</div>
    <div class="school-sub">Al Azra, Sharjah, UAE &nbsp;|&nbsp; Report Card Verification Portal</div>
    <div class="verified-badge">
      <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
    </div>
  </div>
  <div class="card-body" id="content"></div>
  <div class="card-footer">
    Springdale Indian School &nbsp;·&nbsp; P.O Box 27060, Al Azra, Sharjah, UAE &nbsp;·&nbsp; Tel: +971 6 5243335
  </div>
</div>

<script>
  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return {
      sisid:   p.get('sisid')   || '',
      name:    p.get('name')    || '',
      grade:   p.get('grade')   || '',
      section: p.get('section') || '',
      exam:    p.get('exam')    || '',
      year:    p.get('year')    || '2026-2027',
      teacher: p.get('teacher') || ''
    };
  }

  function formatExam(exam) {
    // Convert Term1 → Term 1, PT1 → PT 1 etc
    return exam.replace(/([a-zA-Z]+)(\d+)/, '$1 $2');
  }

  function render() {
    const d = getParams();
    const el = document.getElementById('content');

    if (!d.sisid) {
      el.innerHTML = `
        <div class="not-found">
          <div class="not-found-icon">🔍</div>
          <h2>No Record Found</h2>
          <p>This verification link appears to be invalid.<br>Please contact the school for assistance.</p>
        </div>`;
      return;
    }

    let infoRows = `
      <div class="info-item full">
        <div class="info-label">Student Name</div>
        <div class="info-value">${decodeURIComponent(d.name || d.sisid)}</div>
      </div>
      <div class="info-item">
        <div class="info-label">SIS ID</div>
        <div class="info-value">${d.sisid}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Academic Year</div>
        <div class="info-value">${d.year}</div>
      </div>`;

    if (d.grade) infoRows += `
      <div class="info-item">
        <div class="info-label">Grade</div>
        <div class="info-value">${decodeURIComponent(d.grade)}</div>
      </div>`;

    if (d.section) infoRows += `
      <div class="info-item">
        <div class="info-label">Section</div>
        <div class="info-value">Section ${decodeURIComponent(d.section)}</div>
      </div>`;

    if (d.exam) infoRows += `
      <div class="info-item full">
        <div class="info-label">Examination</div>
        <div class="info-value">${formatExam(decodeURIComponent(d.exam))}</div>
      </div>`;

    if (d.teacher) infoRows += `
      <div class="info-item full">
        <div class="info-label">Class Teacher</div>
        <div class="info-value">${decodeURIComponent(d.teacher)}</div>
      </div>`;

    el.innerHTML = `
      <div class="verified-title">✓ Verified Report Card</div>
      <div class="verified-subtitle">This document has been officially issued by Springdale Indian School</div>
      <div class="divider"></div>
      <div class="info-grid">${infoRows}</div>
      <div class="watermark-box">
        <div class="watermark-text">
          This certifies that the above student's report card has been<br>
          officially verified and issued by Springdale Indian School.
        </div>
        <div class="watermark-stamp">✓ VERIFIED</div>
      </div>
      <div class="footer-note">
        For queries, contact the school at<br>
        <strong>Tel: +971 6 5243335</strong> &nbsp;|&nbsp; <strong>P.O Box 27060, Al Azra, Sharjah, UAE</strong>
      </div>`;
  }

  render();
</script>
</body>
</html>
